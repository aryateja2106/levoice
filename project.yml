name: LeVoice
options:
  bundleIdPrefix: ai.lesearch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.13.6"
  LLM.swift:
    url: https://github.com/obra/LLM.swift.git
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

targets:
  LeVoice:
    type: application
    platform: macOS
    sources:
      - LeVoice
    settings:
      base:
        INFOPLIST_FILE: LeVoice/Info.plist
        CODE_SIGN_ENTITLEMENTS: LeVoice/LeVoice.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: ai.lesearch.levoice
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        # TODO(arya): set this to your own Apple Developer team ID before
        # generating the project. Find it at https://developer.apple.com/account
        # under Membership Details, or run:
        #   security find-identity -v -p codesigning
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
      - package: LLM.swift
        product: LLM
      - package: Sparkle
    entitlements:
      path: LeVoice/LeVoice.entitlements
      properties:
        com.apple.security.device.audio-input: true

  LeVoiceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - LeVoiceTests
    dependencies:
      - target: LeVoice
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LeVoice.app/Contents/MacOS/LeVoice"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  CleanupModelProbe:
    type: tool
    platform: macOS
    sources:
      - CleanupModelProbe
      - CleanupModelProbeSupport
    dependencies:
      - package: LLM.swift
        product: LLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.lesearch.levoice.cleanup-model-probe
        GENERATE_INFOPLIST_FILE: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
